name: Deploy Web

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/4.5.stable ~/.local/share/godot/export_templates/4.5.stable 2>/dev/null || true
          ls ~/.local/share/godot/export_templates/

      - name: Web Export
        run: |
          mkdir -v -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1

      - name: Create Netlify headers
        run: |
          cat > build/web/_headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy Preview to Netlify
        if: github.event_name == 'pull_request'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './build/web'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          production-branch: main
          production-deploy: false
          enable-pull-request-comment: true
          deploy-message: "Preview deploy for PR #${{ github.event.pull_request.number }} @ ${{ github.sha }}"
          alias: deploy-preview-${{ github.event.pull_request.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deploy Production to Netlify
        if: github.event_name != 'pull_request'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './build/web'
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
