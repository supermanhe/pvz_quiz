name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          cp -r /root/.local/share/godot/export_templates/4.5.stable ~/.local/share/godot/export_templates/4.5.stable 2>/dev/null || true

      - name: Windows Export
        run: |
          mkdir -v -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/植物大战僵尸-学习版.exe 2>&1

      - name: Package
        run: |
          cd build/windows
          zip -r ../../植物大战僵尸-学习版-windows.zip .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvz-quiz-windows
          path: 植物大战僵尸-学习版-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: windows-build-${{ github.sha }}
          name: Windows Build (${{ github.sha }})
          files: 植物大战僵尸-学习版-windows.zip
